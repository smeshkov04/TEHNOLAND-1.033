<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технолэнд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        .sim-screen {
            animation: screen-turn-on 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
            position: relative;
        }

        @keyframes screen-turn-on {
            0% {
                transform: scale(1.02) scaleY(0.01);
                filter: brightness(3) contrast(2);
                opacity: 0
            }

            50% {
                transform: scale(1.01) scaleY(1);
                filter: brightness(1.5) contrast(1.2);
                opacity: 1
            }

            100% {
                transform: scale(1) scaleY(1);
                filter: brightness(1) contrast(1);
                opacity: 1
            }
        }

        @keyframes flash-warning {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        @keyframes panic-timer {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes loading-bar {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Custom Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.15);
            border-radius: 10px;
            border: 1px solid rgba(0, 243, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 243, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 243, 255, 0.2) rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext, useMemo, Fragment } = React;

        class ProceduralAudio {
            constructor() {
                this.ctx = null;
                this.isInitialized = false;
                this.currentBgm = null;
                this.currentType = null;
                this.pendingBGM = null;
                
                const init = () => {
                    if(!this.ctx) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        if(AudioContext) {
                            this.ctx = new AudioContext();
                            this.isInitialized = true;
                            if (this.pendingBGM) {
                                const t = this.pendingBGM;
                                this.currentType = null;
                                this.setBGM(t);
                            }
                        }
                    } else if(this.ctx.state === 'suspended') {
                        this.ctx.resume();
                    }
                };
                
                document.addEventListener('click', init, { once: true });
                document.addEventListener('keydown', init, { once: true });

                document.addEventListener('mousedown', (e) => {
                    const tag = e.target.tagName.toLowerCase();
                    const cursor = window.getComputedStyle(e.target).cursor;
                    if(tag === 'button' || tag === 'a' || cursor === 'pointer' || e.target.closest('button')) {
                        this.playClick();
                    }
                });
            }

            playTextBlip() {
                if(!this.isInitialized || this.ctx.state !== 'running') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(800 + Math.random()*500, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.03);
                
                gain.gain.setValueAtTime(0.015, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.03);
            }

            playClick() {
                if(!this.isInitialized || this.ctx.state !== 'running') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.05);
                
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            }

            setBGM(type) {
                if(this.currentType === type) return;
                this.currentType = type;
                this.pendingBGM = type;
                
                if(!this.isInitialized) return; 

                if (this.bgmAudio) {
                    this.bgmAudio.pause();
                    this.bgmAudio.src = '';
                    this.bgmAudio = null;
                }

                if (type === 'lore') {
                    this.bgmAudio = new Audio('/music/Ganga_Through_the_Machine.mp3');
                    this.bgmAudio.loop = true;
                    this.bgmAudio.volume = 0.5;
                    this.bgmAudio.play().catch(e => console.error('Audio play error:', e));
                } else if (type === 'game') {
                    this.bgmAudio = new Audio('/music/Cold_Iron_Prayer.mp3');
                    this.bgmAudio.loop = true;
                    this.bgmAudio.volume = 0.4;
                    this.bgmAudio.play().catch(e => console.error('Audio play error:', e));
                }
            }

            stopBGM() {
                this.setBGM(null);
            }
        }

        window.audioManager = new ProceduralAudio();
        const ARM_POINTS = { home: { x: 0.18, y: 0.0, z: 0.18 }, pick: { x: -0.18, y: 0.12, z: 0.05 }, place: { x: 0.18, y: -0.12, z: 0.06 } };
        const clamp = (v, min, max) => Math.min(max, Math.max(min, v));

        const solveInverseKinematics = (target, metrics) => {
            const baseHeight = 0.08, l1 = 0.18, l2 = 0.17, reachLimit = metrics?.reachRadius || 0.34;
            const x = target.x, y = target.y, z = clamp(target.z, 0.01, 0.28);
            const base = Math.atan2(y, x);
            const r = clamp(Math.sqrt(x * x + y * y), 0.02, reachLimit);
            const vertical = z - baseHeight;
            const dist = clamp(Math.sqrt(r * r + vertical * vertical), 0.04, l1 + l2 - 0.0001);
            const elbow = Math.acos(clamp((l1 * l1 + l2 * l2 - dist * dist) / (2 * l1 * l2), -1, 1));
            const shoulderOffset = Math.atan2(vertical, r);
            const shoulderInner = Math.acos(clamp((l1 * l1 + dist * dist - l2 * l2) / (2 * l1 * dist), -1, 1));
            const shoulder = shoulderOffset + shoulderInner;
            const elbowPoint = { x: Math.cos(base) * Math.cos(shoulder) * l1, y: Math.sin(base) * Math.cos(shoulder) * l1, z: baseHeight + Math.sin(shoulder) * l1 };
            return { base, shoulder, elbow: Math.PI - elbow, joints: [{ x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: baseHeight }, elbowPoint, { x, y, z }] };
        };

        const ROLE_INFO = { proto: { title: 'КОНСТРУКТИУС', mascot: 'proto' }, model: { title: 'ЭКОНОМИКУС', mascot: 'model' }, code: { title: 'КОДИУС', mascot: 'code' } };

        const GameContext = createContext();

        const GameProvider = ({ children }) => {
            const [userRole, setUserRole] = useState(null);
            const [scoreTotal, setScoreTotal] = useState(0);
            const [currentScreen, setCurrentScreen] = useState('quiz');
            const [teamState, setTeamState] = useState({ prototyping: { progress: 0, status: 'playing' }, modeling: { progress: 0, status: 'playing' }, coding: { progress: 0, status: 'playing' } });
            const [simulationData, setSimulationData] = useState({
                scenario: {
                    title: 'RobodexBRICS', region: 'Индия, Бангалор', product: 'Робо-рука 0.42 кг', blockWeight: 0.42, dailyDemand: 640, grantCap: 420, competitorPrice: 780,
                    targets: {
                        budget: 420,
                        reliability: 75,
                        cycleTime: 8.0,
                        payload: 0.42
                    },
                    mission: {
                        context: 'Индия, 2026. Логистический хаб в Бангалоре обрабатывает 640 грузов в день вручную. Требуется заменить ручной труд роботом-манипулятором.',
                        goal: 'Спроектировать, обосновать экономически и запрограммировать 3-осевой манипулятор, способный перекладывать коробки весом 0.42 кг с точностью ≥75%.',
                        budget: 'Грант: $420. Вся сборка (BOM) должна уложиться в эту сумму.',
                        roles: {
                            proto: { title: 'КОНСТРУКТИУС — Надёжность', focus: 'Соберите рабочую конфигурацию', detail: 'Подберите контроллер, приводы, захват и датчики. Следите за энергопотреблением и надёжностью каждого компонента. За бюджетом следит экономист.', target: 'Надёжность ≥75%, без мех. рисков и перегрузок питания' },
                            model: { title: 'ЭКОНОМИКУС — Экономика', focus: 'Следите за ценовыми показателями', detail: 'Контролируйте бюджет гранта $420. Рассчитайте окупаемость — проект должен окупиться ≤24 мес.', target: 'BOM ≤ $420, Payback ≤ 24 мес.' },
                            code: { title: 'КОДИУС — Точность', focus: 'Следите за шумом датчиков', detail: 'Шумные датчики = нестабильная работа. Добавьте фильтр Калмана или утяжелите код для компенсации. Но тяжёлый код = медленный цикл.', target: 'Цикл проходит без ошибок, шум отфильтрован' }
                        },
                        victory: 'Все 3 модуля завершены + композитный скор ≥ 40/100'
                    }
                },
                hardware: { controller: 'esp32_devkit', shoulderActuator: 'mg995', elbowActuator: 'mg995', wristActuator: 'mg996r', gripper: 'parallel_gripper_2f', visionSensor: 'ov2640_cam', forceSensor: 'hx711_loadcell', frameMaterial: 'plastic' },
                bom: [],
                totals: { bomCost: 0, powerWatts: 0, peakCurrent: 0, currentLimit: 5, powerSupplyOverload: false, structuralWeight: 0, payloadCapacity: 0, totalLoad: 0, centerOfMassOffset: 0, comRisk: false, armSpeedFactor: 1, estimatedCycleSeconds: 7.5, reachRadius: 0.34, sensorNoise: 0.04, reliabilityScore: 82, mechanicalRisk: false, requiredPorts: { pwm: 0, analog: 0, digital: 0, uart: 0, i2c: 0 }, controllerPorts: { pwm: 0, analog: 0, digital: 0, uart: 0, i2c: 0 }, controllerPortsOk: true, warnings: [], alerts: [] },
                business: { laborCostMonthly: 420, operatorsCount: 2, robotPrice: 0, serviceMonthly: 28, manualOutputPerMonth: 6400, robotOutputPerMonth: 14080, grantCap: 420, competitorPrice: 780, roiMonths: null, monthlyProfit: 0 },
                software: { nodes: [], validation: 'Не пройдена', reliabilityBonus: 1, sensorFilterWindow: 1, lastRun: null, cyclesPerHour: 0, reachZoneRadius: 0.34, filterType: 'none', variables: {} },
                economics: { hardwareLimit: 300, softwareLimit: 120, activeKpi: null, kpiBonus: 0, tco: { wear: 0, opex: 0 }, activeGrants: [], purchasedLibraries: [] },
                marketState: {
                    indices: { tech: 1.0, energy: 1.0, logistics: 1.0 },
                    history: { tech: [1, 1, 1, 1, 1], energy: [1, 1, 1, 1, 1], logistics: [1, 1, 1, 1, 1] },
                    investments: { tech: 0, energy: 0, logistics: 0 },
                    upgrades: [],
                    creditScore: 70,
                    activeAlert: null,
                    nextUpdate: Date.now() + 45000
                },
                collaboration: { syncMode: 'LocalStorage', messages: [], maskotAlerts: [], panicActive: false, panicEndTime: 0 },
                purchasedSamples: [],
                pitchOutcome: { completed: false, bonus: 0 },
                startTime: Date.now()
            });

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('tehnoland_sim_state');
                    if (saved) {
                        const p = JSON.parse(saved);
                        if (p.simulationData) setSimulationData(p.simulationData);
                        if (p.teamState) setTeamState(p.teamState);
                    }
                } catch (e) {
                    console.warn('Failed to load state from localStorage:', e);
                }
                
                const handler = (e) => {
                    if (e.key === 'tehnoland_sim_state' && e.newValue) {
                        try {
                            const p = JSON.parse(e.newValue);
                            if (p.simulationData) setSimulationData(p.simulationData);
                            if (p.teamState) setTeamState(p.teamState);
                        } catch (ex) {
                            console.warn('Failed to sync state:', ex);
                        }
                    }
                };
                window.addEventListener('storage', handler);
                
                if (window.audioManager) {
                    window.audioManager.setBGM('game');
                }
                
                return () => {
                    window.removeEventListener('storage', handler);
                    if (window.audioManager) window.audioManager.stopBGM();
                };
            }, []);

            useEffect(() => {
                try {
                    const t = setTimeout(() => {
                        localStorage.setItem('tehnoland_sim_state', JSON.stringify({ simulationData, teamState }));
                    }, 100);
                    return () => clearTimeout(t);
                } catch (e) {
                    console.warn('Failed to save state:', e);
                }
            }, [simulationData, teamState]);

            const handleRoleSelect = (role) => {
                // Запускаем таймер при первом выборе роли
                if (!simulationData.collaboration?.competitionStartTime) {
                    setSimulationData(prev => ({
                        ...prev,
                        collaboration: {
                            ...prev.collaboration,
                            competitionStartTime: Date.now()
                        }
                    }));
                }
                setUserRole(role);
                setCurrentScreen(role === 'proto' ? 'prototyping' : role === 'model' ? 'modeling' : 'coding');
            };

            const sendChatMessage = (text, senderName = null) => {
                const message = {
                    id: Date.now() + Math.random(),
                    text: text.trim(),
                    sender: senderName || userRole || 'Аноним',
                    timestamp: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }),
                    role: userRole || 'unknown'
                };
                
                setSimulationData(prev => ({
                    ...prev,
                    collaboration: {
                        ...prev.collaboration,
                        messages: [...(prev.collaboration?.messages || []), message].slice(-50)
                    }
                }));
            };

            return <GameContext.Provider value={{ userRole, setUserRole, scoreTotal, setScoreTotal, currentScreen, setCurrentScreen, teamState, setTeamState, simulationData, setSimulationData, sendChatMessage, handleRoleSelect }}>{children}</GameContext.Provider>;
        };

        const useTeamSimulation = (tableName) => {
            const { teamState, setTeamState, simulationData } = useContext(GameContext);
            const [localElapsed, setLocalElapsed] = useState(0);
            useEffect(() => { const t = setInterval(() => setLocalElapsed(Math.floor((Date.now() - (simulationData.collaboration?.competitionStartTime || Date.now())) / 1000)), 1000); return () => clearInterval(t); }, [simulationData.collaboration?.competitionStartTime]);
            return { localElapsed, setPlayerProgress: (pct) => setTeamState(prev => ({ ...prev, [tableName]: { progress: pct, status: pct >= 100 ? 'done' : 'playing' } })) };
        };



        const ChatPanel = ({ variant = 'default' }) => {
            const { simulationData, sendChatMessage, userRole } = useContext(GameContext);
            const [inputValue, setInputValue] = useState('');
            const [lastMessageCount, setLastMessageCount] = useState(0);
            const [hasNewNotification, setHasNewNotification] = useState(false);
            const [lastMessageRole, setLastMessageRole] = useState(null);
            const chatEndRef = useRef(null);
            const inputRef = useRef(null);
            const audioContextRef = useRef(null);

            const messages = simulationData.collaboration?.messages || [];

            const playNotificationSound = () => {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return;
                    
                    if (!audioContextRef.current) {
                        audioContextRef.current = new AudioCtx();
                    }
                    
                    const ctx = audioContextRef.current;
                    
                    if (ctx.state === 'suspended') {
                        ctx.resume().catch(() => {});
                    }
                    
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    
                    oscillator.frequency.setValueAtTime(800, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
                    
                    gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.15);
                } catch (e) {
                    // Audio not available, ignore
                }
            };

            useEffect(() => {
                if (messages.length > lastMessageCount && lastMessageCount > 0) {
                    const lastMsg = messages[messages.length - 1];
                    const isFromOthers = lastMsg.role !== userRole;
                    
                    if (isFromOthers) {
                        setHasNewNotification(true);
                        setLastMessageRole(lastMsg.role);
                        playNotificationSound();
                        
                        const timer = setTimeout(() => {
                            setHasNewNotification(false);
                            setLastMessageRole(null);
                        }, 3000);
                        return () => clearTimeout(timer);
                    }
                }
                setLastMessageCount(messages.length);
            }, [messages.length, userRole]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSubmit = (e) => {
                e?.preventDefault();
                if (!inputValue.trim()) return;
                
                const roleNames = { proto: 'КОНСТРУКТОР', model: 'ЭКОНОМИСТ', code: 'ПРОГРАММИСТ' };
                const senderName = roleNames[userRole] || userRole || 'УЧАСТНИК';
                
                sendChatMessage(inputValue, senderName);
                setInputValue('');
                setHasNewNotification(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSubmit();
                }
            };

            const getRoleColor = (role) => {
                const colors = { proto: '#ffb36b', model: '#7de8ff', code: '#c58fff' };
                return colors[role] || '#fff';
            };

            const voiceStatus = 'VOICE ACTIVE';
            const lagMs = (Math.random() * 50 + 10).toFixed(0);

            const sizeStyles = {
                compact: { minHeight: '260px', padding: '12px 14px', fontSize: '11px' },
                default: { minHeight: '260px', padding: '12px 16px', fontSize: '11px' },
                large: { minHeight: '300px', padding: '16px', fontSize: '12px' }
            };
            const sizes = sizeStyles[variant] || sizeStyles.default;

            return (
                <div style={{
                    display: 'flex',
                    flexDirection: 'column',
                    background: 'rgba(0,0,0,0.1)',
                    border: hasNewNotification ? '1px solid rgba(0, 243, 255, 0.5)' : '1px solid var(--prof-border)',
                    overflow: 'hidden',
                    height: variant === 'compact' ? '280px' : variant === 'large' ? '340px' : '300px',
                    borderRadius: '6px',
                    boxShadow: hasNewNotification ? '0 0 20px rgba(0, 243, 255, 0.2)' : 'none',
                    transition: 'all 0.3s ease'
                }}>
                    <style>{`
                        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.05); } }
                        @keyframes notification-glow { 0%, 100% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); } 50% { box-shadow: 0 0 25px rgba(0, 243, 255, 0.6); } }
                        .chat-input-focus:focus { outline: none; border-color: rgba(0, 243, 255, 0.5) !important; box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
                    `}</style>

                    {/* Header */}
                    <div style={{
                        padding: '10px 16px',
                        background: 'rgba(255,255,255,0.02)',
                        borderBottom: '1px solid rgba(255,255,255,0.05)',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center'
                    }}>
                        <div style={{ fontSize: '10px', fontWeight: '800', color: 'var(--prof-accent)', letterSpacing: '1px' }}>
                            КОМАНДНЫЙ ЦЕНТР{hasNewNotification && ' 🔔'}
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            {hasNewNotification && lastMessageRole && (
                                <div style={{
                                    fontSize: '9px',
                                    color: getRoleColor(lastMessageRole),
                                    fontWeight: '900',
                                    animation: 'notification-glow 1.5s infinite',
                                    padding: '2px 8px',
                                    borderRadius: '3px',
                                    background: `${getRoleColor(lastMessageRole)}15`,
                                    border: `1px solid ${getRoleColor(lastMessageRole)}40`
                                }}>
                                    НОВОЕ СООБЩЕНИЕ
                                </div>
                            )}
                            {messages.length > 0 && !hasNewNotification && (
                                <div style={{
                                    width: '18px', height: '18px', borderRadius: '50%',
                                    background: 'rgba(0, 243, 255, 0.2)',
                                    border: '1px solid rgba(0, 243, 255, 0.4)',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontSize: '9px', color: 'var(--neon-blue)', fontWeight: '900'
                                }}>
                                    {messages.length > 9 ? '9+' : messages.length}
                                </div>
                            )}
                            <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: 'var(--prof-success)', boxShadow: '0 0 8px var(--prof-success)' }} />
                        </div>
                    </div>

                    {/* Voice Chat Indicator */}
                    <div style={{
                        padding: `${parseInt(sizes.padding) - 2}px 16px`,
                        display: 'flex', gap: '12px',
                        borderBottom: '1px solid rgba(255,255,255,0.03)',
                        alignItems: 'center'
                    }}>
                        <div style={{ position: 'relative' }}>
                            <div style={{
                                width: variant === 'large' ? '42px' : '36px',
                                height: variant === 'large' ? '42px' : '36px',
                                borderRadius: '50%',
                                background: 'var(--prof-border)',
                                border: '2px solid var(--prof-success)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: variant === 'large' ? '20px' : '16px'
                            }}>
                                👤
                            </div>
                            <div style={{
                                position: 'absolute', inset: -3, borderRadius: '50%',
                                border: '2px solid var(--prof-success)', opacity: 0.3,
                                animation: 'pulse 2s infinite'
                            }} />
                        </div>

        const CleanupAnimation = () => {
            const { simulationData } = useContext(GameContext);
            const hardware = simulationData?.hardware || {};
            const [ikState, setIkState] = useState({ base: 0, shoulder: 40, elbow: 60, wrist: 0 });
            const [gripClosed, setGripClosed] = useState(false);
            
            const [trashState, setTrashState] = useState([
                { id: 1, x: -39, y: 334, type: 'bottle', state: 'ground' },
                { id: 2, x: -160, y: 325, type: 'electronics', state: 'ground' },
                { id: 3, x: -190, y: 307, type: 'can', state: 'ground' }
            ]);

            useEffect(() => {
                let reqId;
                let startTime = Date.now();
                
                const sequence = [
                    { t: 0, s: { shoulder: -80, elbow: -90, wrist: 10 }, grip: false },
                    
                    // Item 1 (x: -39)
                    { t: 1000, s: { shoulder: -80, elbow: -90, wrist: 10 }, grip: false },
                    { t: 1500, s: { shoulder: -80, elbow: -110, wrist: 10 }, grip: true },
                    { t: 2000, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: true }, 
                    { t: 3000, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: true }, 
                    { t: 3500, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: false }, 
                    
                    // Item 2 (x: -160)
                    { t: 4500, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: false }, 
                    { t: 5500, s: { shoulder: -90, elbow: -25, wrist: -45 }, grip: false },
                    { t: 6000, s: { shoulder: -90, elbow: -45, wrist: -45 }, grip: true },
                    { t: 6500, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: true },
                    { t: 7500, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: true },
                    { t: 8000, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: false },
                    
                    // Item 3 (x: -190)
                    { t: 9000, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: false },
                    { t: 10000, s: { shoulder: -105, elbow: 20, wrist: -75 }, grip: false },
                    { t: 10500, s: { shoulder: -105, elbow: 0, wrist: -75 }, grip: true },
                    { t: 11000, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: true },
                    { t: 12000, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: true },
                    { t: 12500, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: false },

                    { t: 13500, s: { shoulder: -80, elbow: -90, wrist: 10 }, grip: false },
                ];
                
                const totalDuration = 14500;
                const lerp = (a, b, t) => {
                    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    return a + (b - a) * ease;
                };

                const loop = () => {
                    const elapsed = (Date.now() - startTime) % totalDuration;
                    
                    let kf1 = sequence[0], kf2 = sequence[0];
                    for(let i=0; i < sequence.length - 1; i++) {
                        if (elapsed >= sequence[i].t && elapsed < sequence[i+1].t) {
                            kf1 = sequence[i]; kf2 = sequence[i+1]; break;
                        }
                    }
                    if (elapsed >= sequence[sequence.length-1].t) {
                        kf1 = sequence[sequence.length-1]; kf2 = sequence[sequence.length-1];
                    }
                    
                    const dt = kf2.t - kf1.t;
                    const progress = dt === 0 ? 1 : Math.max(0, Math.min(1, (elapsed - kf1.t) / dt));
                    
                    setIkState({
                        base: 0,
                        shoulder: lerp(kf1.s.shoulder, kf2.s.shoulder, progress),
                        elbow: lerp(kf1.s.elbow, kf2.s.elbow, progress),
                        wrist: lerp(kf1.s.wrist, kf2.s.wrist, progress)
                    });
                    
                    setGripClosed(kf2.grip);
                    
                    setTrashState([
                        { id: 1, x: -39, type: 'bottle', y: 334, state: elapsed < 1200 ? 'ground' : elapsed < 3500 ? 'grabbed' : 'bin' },
                        { id: 2, x: -160, type: 'electronics', y: 325, state: elapsed < 5800 ? 'ground' : elapsed < 8000 ? 'grabbed' : 'bin' },

                    ]);

            const eEndY = sEndY - L2 * Math.cos(s_rad + e_rad);

                                {totalScore >= 600 ? '🏆 ПРОЕКТ ПРИНЯТ В СЕРИЮ' : '⚠️ ТРЕБУЕТСЯ ДОРАБОТКА'}
                            </h1>
                            <p style={{ fontSize: '12px', color: 'rgba(226,232,240,0.5)', marginTop: '6px' }}>
                                {totalScore >= 600 ? 'Манипулятор функционален и экономически оправдан.' : 'Проект имеет критические недостатки.'}
                            </p>
                        </div>

                        {/* 3-column grid */}
                        <div style={{ display: 'grid', gridTemplateColumns: '220px 1fr 340px', gap: '20px', width: '100%', maxWidth: '1280px', alignItems: 'stretch' }}>

                            {/* Grade card */}
                            <div className="lb-in" style={{ animationDelay: '0.15s', background: 'rgba(6,12,24,0.7)', border: `1px solid ${gColor}28`, borderRadius: '14px', padding: '24px 16px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(12px)' }}>
                                <div style={{ fontSize: '9px', letterSpacing: '0.2em', color: 'rgba(255,255,255,0.35)', marginBottom: '14px' }}>ИТОГОВЫЙ РЕЙТИНГ</div>
                                <div style={{ position: 'relative', width: '140px', height: '140px', marginBottom: '14px' }}>
                                    <div style={{ position: 'absolute', inset: 0, borderRadius: '50%', border: `1px solid ${gColor}25` }} />
                                    <div style={{ position: 'absolute', inset: -4, borderRadius: '50%', border: `1px dashed ${gColor}38`, animation: 'lbRotate 20s linear infinite' }} />
                                    <div style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: `radial-gradient(circle, ${gColor}0f 0%, transparent 70%)` }} />
                                    <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '84px', fontWeight: '900', color: gColor, textShadow: `0 0 40px ${gColor}88`, fontFamily: "'Orbitron', sans-serif" }}>{grade}</div>
                                </div>
                                <div style={{ fontSize: '20px', fontWeight: '900', color: '#fff' }}>{totalScore}</div>
                                <div style={{ fontSize: '10px', color: 'rgba(255,255,255,0.3)', marginTop: '2px' }}>из 1000 очков</div>
                            </div>

                            {/* Middle: stats */}
                            <div className="lb-in" style={{ animationDelay: '0.25s', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                {/* Score breakdown */}
                                <div style={{ background: 'rgba(6,12,24,0.7)', border: '1px solid rgba(212,160,106,0.15)', borderRadius: '14px', padding: '16px 20px', backdropFilter: 'blur(12px)', flex: 1 }}>
                                    <div style={{ fontSize: '9px', letterSpacing: '0.2em', color: '#d4a06a', marginBottom: '14px', fontWeight: '800' }}>СТРУКТУРА ОЧКОВ</div>
                                    {[
                                        { label: 'ИНЖЕНЕРИЯ', val: result.engineering, max: 400, color: '#7de8ff' },
                                        { label: 'СБОРКА', val: result.completion, max: 600, color: '#8cffb1' },
                                        { label: 'ИНВЕСТОРЫ', val: Math.round(result.trust || 0), max: 100, color: '#ffb36b' }
                                    ].map(item => (
                                        <div key={item.label} style={{ marginBottom: '10px' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px', marginBottom: '5px' }}>
                                                <span style={{ color: 'rgba(255,255,255,0.55)', fontWeight: '600' }}>{item.label}</span>
                                                <span style={{ color: item.color, fontWeight: '800' }}>{item.val} / {item.max}</span>
                                            </div>
                                            <div style={{ height: '4px', background: 'rgba(255,255,255,0.06)', borderRadius: '2px', overflow: 'hidden' }}>
                                                <div style={{ height: '100%', width: `${Math.min(100, (item.val / item.max) * 100)}%`, background: `linear-gradient(90deg, ${item.color}88, ${item.color})`, borderRadius: '2px' }} />
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Specs grid */}
                                <div style={{ background: 'rgba(6,12,24,0.7)', border: '1px solid rgba(212,160,106,0.15)', borderRadius: '14px', padding: '16px 20px', backdropFilter: 'blur(12px)' }}>
                                    <div style={{ fontSize: '9px', letterSpacing: '0.2em', color: '#d4a06a', marginBottom: '12px', fontWeight: '800' }}>СПЕЦИФИКАЦИИ</div>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                                        {[
                                            { label: 'BOM', val: `$${Math.round(result.metrics.bom)}`, icon: '💰' },
                                            { label: 'НАДЁЖНОСТЬ', val: `${Math.round(result.metrics.reliability)}%`, icon: '💎' },
                                            { label: 'ЦИКЛ', val: `${result.metrics.cycle?.toFixed(1)}с`, icon: '⚡' },
                                            { label: 'ТЯГА', val: `${result.metrics.payload?.toFixed(2)}кг`, icon: '⚖️' }
                                        ].map(s => (
                                            <div key={s.label} style={{ display: 'flex', alignItems: 'center', gap: '8px', background: 'rgba(255,255,255,0.03)', padding: '8px 10px', borderRadius: '8px' }}>
                                                <span style={{ fontSize: '16px' }}>{s.icon}</span>
                                                <div>
                                                    <div style={{ fontSize: '8px', color: 'rgba(255,255,255,0.3)', letterSpacing: '0.15em' }}>{s.label}</div>
                                                    <div style={{ fontSize: '13px', fontWeight: '800', color: '#fff' }}>{s.val}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Continue button */}
                                <button
                                    onClick={handleContinue}
                                    style={{
                                        padding: '14px', borderRadius: '10px', fontSize: '12px', fontWeight: '800',
                                        letterSpacing: '0.25em', cursor: 'pointer',
                                        border: '1px solid rgba(212,160,106,0.6)',
                                        background: 'rgba(212,160,106,0.12)', color: '#d4a06a',
                                        fontFamily: "'IBM Plex Mono', monospace",
                                        transition: 'all 0.2s', width: '100%'
                                    }}
                                >
                                    ПРОДОЛЖИТЬ →
                                </button>
                            </div>

                            {/* Right: cleanup animation */}
                            <div className="lb-in" style={{ animationDelay: '0.35s', borderRadius: '14px', overflow: 'hidden', border: '1px solid rgba(255,255,255,0.06)', minHeight: '280px' }}>
                                <CleanupAnimation />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // [MODULE_INJECTION_MARKER]
    </script>
</body>

</html>
