<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технолэнд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        .sim-screen {
            animation: screen-turn-on 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
            position: relative;
        }

        @keyframes screen-turn-on {
            0% {
                transform: scale(1.02) scaleY(0.01);
                filter: brightness(3) contrast(2);
                opacity: 0
            }

            50% {
                transform: scale(1.01) scaleY(1);
                filter: brightness(1.5) contrast(1.2);
                opacity: 1
            }

            100% {
                transform: scale(1) scaleY(1);
                filter: brightness(1) contrast(1);
                opacity: 1
            }
        }

        @keyframes flash-warning {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        @keyframes panic-timer {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes loading-bar {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Custom Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.15);
            border-radius: 10px;
            border: 1px solid rgba(0, 243, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 243, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 243, 255, 0.2) rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext, useMemo, Fragment } = React;

        class ProceduralAudio {
            constructor() {
                this.ctx = null;
                this.isInitialized = false;
                this.currentBgm = null;
                this.currentType = null;
                this.pendingBGM = null;
                
                const init = () => {
                    if(!this.ctx) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        if(AudioContext) {
                            this.ctx = new AudioContext();
                            this.isInitialized = true;
                            if (this.pendingBGM) {
                                const t = this.pendingBGM;
                                this.currentType = null;
                                this.setBGM(t);
                            }
                        }
                    } else if(this.ctx.state === 'suspended') {
                        this.ctx.resume();
                    }
                };
                
                document.addEventListener('click', init, { once: true });
                document.addEventListener('keydown', init, { once: true });

                document.addEventListener('mousedown', (e) => {
                    const tag = e.target.tagName.toLowerCase();
                    const cursor = window.getComputedStyle(e.target).cursor;
                    if(tag === 'button' || tag === 'a' || cursor === 'pointer' || e.target.closest('button')) {
                        this.playClick();
                    }
                });
            }

            playTextBlip() {
                if(!this.isInitialized || this.ctx.state !== 'running') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(800 + Math.random()*500, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.03);
                
                gain.gain.setValueAtTime(0.015, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.03);
            }

            playClick() {
                if(!this.isInitialized || this.ctx.state !== 'running') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.05);
                
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            }

            setBGM(type) {
                if(this.currentType === type) return;
                this.currentType = type;
                this.pendingBGM = type;
                
                if(!this.isInitialized) return; 

                if (this.bgmAudio) {
                    this.bgmAudio.pause();
                    this.bgmAudio.src = '';
                    this.bgmAudio = null;
                }

                if (type === 'lore') {
                    this.bgmAudio = new Audio('/music/Ganga_Through_the_Machine.mp3');
                    this.bgmAudio.loop = true;
                    this.bgmAudio.volume = 0.5;
                    this.bgmAudio.play().catch(e => console.error('Audio play error:', e));
                } else if (type === 'game') {
                    this.bgmAudio = new Audio('/music/Cold_Iron_Prayer.mp3');
                    this.bgmAudio.loop = true;
                    this.bgmAudio.volume = 0.4;
                    this.bgmAudio.play().catch(e => console.error('Audio play error:', e));
                }
            }

            stopBGM() {
                this.setBGM(null);
            }
        }

        window.audioManager = new ProceduralAudio();
        const ARM_POINTS = { home: { x: 0.18, y: 0.0, z: 0.18 }, pick: { x: -0.18, y: 0.12, z: 0.05 }, place: { x: 0.18, y: -0.12, z: 0.06 } };
        const clamp = (v, min, max) => Math.min(max, Math.max(min, v));

        const solveInverseKinematics = (target, metrics) => {
            const baseHeight = 0.08, l1 = 0.18, l2 = 0.17, reachLimit = metrics?.reachRadius || 0.34;
            const x = target.x, y = target.y, z = clamp(target.z, 0.01, 0.28);
            const base = Math.atan2(y, x);
            const r = clamp(Math.sqrt(x * x + y * y), 0.02, reachLimit);
            const vertical = z - baseHeight;
            const dist = clamp(Math.sqrt(r * r + vertical * vertical), 0.04, l1 + l2 - 0.0001);
            const elbow = Math.acos(clamp((l1 * l1 + l2 * l2 - dist * dist) / (2 * l1 * l2), -1, 1));
            const shoulderOffset = Math.atan2(vertical, r);
            const shoulderInner = Math.acos(clamp((l1 * l1 + dist * dist - l2 * l2) / (2 * l1 * dist), -1, 1));
            const shoulder = shoulderOffset + shoulderInner;
            const elbowPoint = { x: Math.cos(base) * Math.cos(shoulder) * l1, y: Math.sin(base) * Math.cos(shoulder) * l1, z: baseHeight + Math.sin(shoulder) * l1 };
            return { base, shoulder, elbow: Math.PI - elbow, joints: [{ x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: baseHeight }, elbowPoint, { x, y, z }] };
        };

        const ROLE_INFO = { proto: { title: 'КОНСТРУКТИУС', mascot: 'proto' }, model: { title: 'ЭКОНОМИКУС', mascot: 'model' }, code: { title: 'КОДИУС', mascot: 'code' } };

        const GameContext = createContext();

        const GameProvider = ({ children }) => {
            const [userRole, setUserRole] = useState(null);
            const [scoreTotal, setScoreTotal] = useState(0);
            const [currentScreen, setCurrentScreen] = useState('quiz');
            const [teamState, setTeamState] = useState({ prototyping: { progress: 0, status: 'playing' }, modeling: { progress: 0, status: 'playing' }, coding: { progress: 0, status: 'playing' } });
            const [simulationData, setSimulationData] = useState({
                scenario: {
                    title: 'RobodexBRICS', region: 'Индия, Бангалор', product: 'Робо-рука 0.42 кг', blockWeight: 0.42, dailyDemand: 640, grantCap: 420, competitorPrice: 780,
                    targets: {
                        budget: 420,
                        reliability: 75,
                        cycleTime: 8.0,
                        payload: 0.42
                    },
                    mission: {
                        context: 'Индия, 2026. Логистический хаб в Бангалоре обрабатывает 640 грузов в день вручную. Требуется заменить ручной труд роботом-манипулятором.',
                        goal: 'Спроектировать, обосновать экономически и запрограммировать 3-осевой манипулятор, способный перекладывать коробки весом 0.42 кг с точностью ≥75%.',
                        budget: 'Грант: $420. Вся сборка (BOM) должна уложиться в эту сумму.',
                        roles: {
                            proto: { title: 'КОНСТРУКТИУС — Надёжность', focus: 'Соберите рабочую конфигурацию', detail: 'Подберите контроллер, приводы, захват и датчики. Следите за энергопотреблением и надёжностью каждого компонента. За бюджетом следит экономист.', target: 'Надёжность ≥75%, без мех. рисков и перегрузок питания' },
                            model: { title: 'ЭКОНОМИКУС — Экономика', focus: 'Следите за ценовыми показателями', detail: 'Контролируйте бюджет гранта $420. Рассчитайте окупаемость — проект должен окупиться ≤24 мес.', target: 'BOM ≤ $420, Payback ≤ 24 мес.' },
                            code: { title: 'КОДИУС — Точность', focus: 'Следите за шумом датчиков', detail: 'Шумные датчики = нестабильная работа. Добавьте фильтр Калмана или утяжелите код для компенсации. Но тяжёлый код = медленный цикл.', target: 'Цикл проходит без ошибок, шум отфильтрован' }
                        },
                        victory: 'Все 3 модуля завершены + композитный скор ≥ 40/100'
                    }
                },
                hardware: { controller: 'esp32_devkit', shoulderActuator: 'mg995', elbowActuator: 'mg995', wristActuator: 'mg996r', gripper: 'parallel_gripper_2f', visionSensor: 'ov2640_cam', forceSensor: 'hx711_loadcell', frameMaterial: 'plastic' },
                bom: [],
                totals: { bomCost: 0, powerWatts: 0, peakCurrent: 0, currentLimit: 5, powerSupplyOverload: false, structuralWeight: 0, payloadCapacity: 0, totalLoad: 0, centerOfMassOffset: 0, comRisk: false, armSpeedFactor: 1, estimatedCycleSeconds: 7.5, reachRadius: 0.34, sensorNoise: 0.04, reliabilityScore: 82, mechanicalRisk: false, requiredPorts: { pwm: 0, analog: 0, digital: 0, uart: 0, i2c: 0 }, controllerPorts: { pwm: 0, analog: 0, digital: 0, uart: 0, i2c: 0 }, controllerPortsOk: true, warnings: [], alerts: [] },
                business: { laborCostMonthly: 420, operatorsCount: 2, robotPrice: 0, serviceMonthly: 28, manualOutputPerMonth: 6400, robotOutputPerMonth: 14080, grantCap: 420, competitorPrice: 780, roiMonths: null, monthlyProfit: 0 },
                software: { nodes: [], validation: 'Не пройдена', reliabilityBonus: 1, sensorFilterWindow: 1, lastRun: null, cyclesPerHour: 0, reachZoneRadius: 0.34, filterType: 'none', variables: {} },
                economics: { hardwareLimit: 300, softwareLimit: 120, activeKpi: null, kpiBonus: 0, tco: { wear: 0, opex: 0 }, activeGrants: [], purchasedLibraries: [] },
                marketState: {
                    indices: { tech: 1.0, energy: 1.0, logistics: 1.0 },
                    history: { tech: [1, 1, 1, 1, 1], energy: [1, 1, 1, 1, 1], logistics: [1, 1, 1, 1, 1] },
                    investments: { tech: 0, energy: 0, logistics: 0 },
                    upgrades: [],
                    creditScore: 70,
                    activeAlert: null,
                    nextUpdate: Date.now() + 45000
                },
                collaboration: { syncMode: 'LocalStorage', messages: [], maskotAlerts: [], panicActive: false, panicEndTime: 0 },
                purchasedSamples: [],
                pitchOutcome: { completed: false, bonus: 0 },
                startTime: Date.now()
            });

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('tehnoland_sim_state');
                    if (saved) {
                        const p = JSON.parse(saved);
                        if (p.simulationData) setSimulationData(p.simulationData);
                        if (p.teamState) setTeamState(p.teamState);
                    }
                } catch (e) {
                    console.warn('Failed to load state from localStorage:', e);
                }
                
                const handler = (e) => {
                    if (e.key === 'tehnoland_sim_state' && e.newValue) {
                        try {
                            const p = JSON.parse(e.newValue);
                            if (p.simulationData) setSimulationData(p.simulationData);
                            if (p.teamState) setTeamState(p.teamState);
                        } catch (ex) {
                            console.warn('Failed to sync state:', ex);
                        }
                    }
                };
                window.addEventListener('storage', handler);
                
                if (window.audioManager) {
                    window.audioManager.setBGM('game');
                }
                
                return () => {
                    window.removeEventListener('storage', handler);
                    if (window.audioManager) window.audioManager.stopBGM();
                };
            }, []);

            useEffect(() => {
                try {
                    const t = setTimeout(() => {
                        localStorage.setItem('tehnoland_sim_state', JSON.stringify({ simulationData, teamState }));
                    }, 100);
                    return () => clearTimeout(t);
                } catch (e) {
                    console.warn('Failed to save state:', e);
                }
            }, [simulationData, teamState]);

            const handleRoleSelect = (role) => {
                // Запускаем таймер при первом выборе роли
                if (!simulationData.collaboration?.competitionStartTime) {
                    setSimulationData(prev => ({
                        ...prev,
                        collaboration: {
                            ...prev.collaboration,
                            competitionStartTime: Date.now()
                        }
                    }));
                }
                setUserRole(role);
                setCurrentScreen(role === 'proto' ? 'prototyping' : role === 'model' ? 'modeling' : 'coding');
            };

            const sendChatMessage = (text, senderName = null) => {
                const message = {
                    id: Date.now() + Math.random(),
                    text: text.trim(),
                    sender: senderName || userRole || 'Аноним',
                    timestamp: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }),
                    role: userRole || 'unknown'
                };
                
                setSimulationData(prev => ({
                    ...prev,
                    collaboration: {
                        ...prev.collaboration,
                        messages: [...(prev.collaboration?.messages || []), message].slice(-50)
                    }
                }));
            };

            return <GameContext.Provider value={{ userRole, setUserRole, scoreTotal, setScoreTotal, currentScreen, setCurrentScreen, teamState, setTeamState, simulationData, setSimulationData, sendChatMessage, handleRoleSelect }}>{children}</GameContext.Provider>;
        };

        const useTeamSimulation = (tableName) => {
            const { teamState, setTeamState, simulationData } = useContext(GameContext);
            const [localElapsed, setLocalElapsed] = useState(0);
            useEffect(() => { const t = setInterval(() => setLocalElapsed(Math.floor((Date.now() - (simulationData.collaboration?.competitionStartTime || Date.now())) / 1000)), 1000); return () => clearInterval(t); }, [simulationData.collaboration?.competitionStartTime]);
            return { localElapsed, setPlayerProgress: (pct) => setTeamState(prev => ({ ...prev, [tableName]: { progress: pct, status: pct >= 100 ? 'done' : 'playing' } })) };
        };



        const ChatPanel = ({ variant = 'default' }) => {
            const { simulationData, sendChatMessage, userRole } = useContext(GameContext);
            const [inputValue, setInputValue] = useState('');
            const [lastMessageCount, setLastMessageCount] = useState(0);
            const [hasNewNotification, setHasNewNotification] = useState(false);
            const [lastMessageRole, setLastMessageRole] = useState(null);
            const chatEndRef = useRef(null);
            const inputRef = useRef(null);
            const audioContextRef = useRef(null);

            const messages = simulationData.collaboration?.messages || [];

            const playNotificationSound = () => {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return;
                    
                    if (!audioContextRef.current) {
                        audioContextRef.current = new AudioCtx();
                    }
                    
                    const ctx = audioContextRef.current;
                    
                    if (ctx.state === 'suspended') {
                        ctx.resume().catch(() => {});
                    }
                    
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    
                    oscillator.frequency.setValueAtTime(800, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
                    
                    gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.15);
                } catch (e) {
                    // Audio not available, ignore
                }
            };

            useEffect(() => {
                if (messages.length > lastMessageCount && lastMessageCount > 0) {
                    const lastMsg = messages[messages.length - 1];
                    const isFromOthers = lastMsg.role !== userRole;
                    
                    if (isFromOthers) {
                        setHasNewNotification(true);
                        setLastMessageRole(lastMsg.role);
                        playNotificationSound();
                        
                        const timer = setTimeout(() => {
                            setHasNewNotification(false);
                            setLastMessageRole(null);
                        }, 3000);
                        return () => clearTimeout(timer);
                    }
                }
                setLastMessageCount(messages.length);
            }, [messages.length, userRole]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSubmit = (e) => {
                e?.preventDefault();
                if (!inputValue.trim()) return;
                
                const roleNames = { proto: 'КОНСТРУКТОР', model: 'ЭКОНОМИСТ', code: 'ПРОГРАММИСТ' };
                const senderName = roleNames[userRole] || userRole || 'УЧАСТНИК';
                
                sendChatMessage(inputValue, senderName);
                setInputValue('');
                setHasNewNotification(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSubmit();
                }
            };

            const getRoleColor = (role) => {
                const colors = { proto: '#ffb36b', model: '#7de8ff', code: '#c58fff' };
                return colors[role] || '#fff';
            };

            const voiceStatus = 'VOICE ACTIVE';
            const lagMs = (Math.random() * 50 + 10).toFixed(0);

            const sizeStyles = {
                compact: { minHeight: '260px', padding: '12px 14px', fontSize: '11px' },
                default: { minHeight: '260px', padding: '12px 16px', fontSize: '11px' },
                large: { minHeight: '300px', padding: '16px', fontSize: '12px' }
            };
            const sizes = sizeStyles[variant] || sizeStyles.default;

            return (
                <div style={{
                    display: 'flex',
                    flexDirection: 'column',
                    background: 'rgba(0,0,0,0.1)',
                    border: hasNewNotification ? '1px solid rgba(0, 243, 255, 0.5)' : '1px solid var(--prof-border)',
                    overflow: 'hidden',
                    height: variant === 'compact' ? '280px' : variant === 'large' ? '340px' : '300px',
                    borderRadius: '6px',
                    boxShadow: hasNewNotification ? '0 0 20px rgba(0, 243, 255, 0.2)' : 'none',
                    transition: 'all 0.3s ease'
                }}>
                    <style>{`
                        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.05); } }
                        @keyframes notification-glow { 0%, 100% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); } 50% { box-shadow: 0 0 25px rgba(0, 243, 255, 0.6); } }
                        .chat-input-focus:focus { outline: none; border-color: rgba(0, 243, 255, 0.5) !important; box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
                    `}</style>

                    {/* Header */}
                    <div style={{
                        padding: '10px 16px',
                        background: 'rgba(255,255,255,0.02)',
                        borderBottom: '1px solid rgba(255,255,255,0.05)',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center'
                    }}>
                        <div style={{ fontSize: '10px', fontWeight: '800', color: 'var(--prof-accent)', letterSpacing: '1px' }}>
                            КОМАНДНЫЙ ЦЕНТР{hasNewNotification && ' 🔔'}
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            {hasNewNotification && lastMessageRole && (
                                <div style={{
                                    fontSize: '9px',
                                    color: getRoleColor(lastMessageRole),
                                    fontWeight: '900',
                                    animation: 'notification-glow 1.5s infinite',
                                    padding: '2px 8px',
                                    borderRadius: '3px',
                                    background: `${getRoleColor(lastMessageRole)}15`,
                                    border: `1px solid ${getRoleColor(lastMessageRole)}40`
                                }}>
                                    НОВОЕ СООБЩЕНИЕ
                                </div>
                            )}
                            {messages.length > 0 && !hasNewNotification && (
                                <div style={{
                                    width: '18px', height: '18px', borderRadius: '50%',
                                    background: 'rgba(0, 243, 255, 0.2)',
                                    border: '1px solid rgba(0, 243, 255, 0.4)',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontSize: '9px', color: 'var(--neon-blue)', fontWeight: '900'
                                }}>
                                    {messages.length > 9 ? '9+' : messages.length}
                                </div>
                            )}
                            <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: 'var(--prof-success)', boxShadow: '0 0 8px var(--prof-success)' }} />
                        </div>
                    </div>

                    {/* Voice Chat Indicator */}
                    <div style={{
                        padding: `${parseInt(sizes.padding) - 2}px 16px`,
                        display: 'flex', gap: '12px',
                        borderBottom: '1px solid rgba(255,255,255,0.03)',
                        alignItems: 'center'
                    }}>
                        <div style={{ position: 'relative' }}>
                            <div style={{
                                width: variant === 'large' ? '42px' : '36px',
                                height: variant === 'large' ? '42px' : '36px',
                                borderRadius: '50%',
                                background: 'var(--prof-border)',
                                border: '2px solid var(--prof-success)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: variant === 'large' ? '20px' : '16px'
                            }}>
                                👤
                            </div>
                            <div style={{
                                position: 'absolute', inset: -3, borderRadius: '50%',
                                border: '2px solid var(--prof-success)', opacity: 0.3,
                                animation: 'pulse 2s infinite'
                            }} />
                        </div>

        const CleanupAnimation = () => {
            const { simulationData } = useContext(GameContext);
            const hardware = simulationData?.hardware || {};
            const [ikState, setIkState] = useState({ base: 0, shoulder: 40, elbow: 60, wrist: 0 });
            const [gripClosed, setGripClosed] = useState(false);
            
            const [trashState, setTrashState] = useState([
                { id: 1, x: -39, y: 334, type: 'bottle', state: 'ground' },
                { id: 2, x: -160, y: 325, type: 'electronics', state: 'ground' },
                { id: 3, x: -190, y: 307, type: 'can', state: 'ground' }
            ]);

            useEffect(() => {
                let reqId;
                let startTime = Date.now();
                
                const sequence = [
                    { t: 0, s: { shoulder: -80, elbow: -90, wrist: 10 }, grip: false },
                    
                    // Item 1 (x: -39)
                    { t: 1000, s: { shoulder: -80, elbow: -90, wrist: 10 }, grip: false },
                    { t: 1500, s: { shoulder: -80, elbow: -110, wrist: 10 }, grip: true },
                    { t: 2000, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: true }, 
                    { t: 3000, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: true }, 
                    { t: 3500, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: false }, 
                    
                    // Item 2 (x: -160)
                    { t: 4500, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: false }, 
                    { t: 5500, s: { shoulder: -90, elbow: -25, wrist: -45 }, grip: false },
                    { t: 6000, s: { shoulder: -90, elbow: -45, wrist: -45 }, grip: true },
                    { t: 6500, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: true },
                    { t: 7500, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: true },
                    { t: 8000, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: false },
                    
                    // Item 3 (x: -190)
                    { t: 9000, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: false },
                    { t: 10000, s: { shoulder: -105, elbow: 20, wrist: -75 }, grip: false },
                    { t: 10500, s: { shoulder: -105, elbow: 0, wrist: -75 }, grip: true },
                    { t: 11000, s: { shoulder: -50, elbow: -50, wrist: 0 }, grip: true },
                    { t: 12000, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: true },
                    { t: 12500, s: { shoulder: 20, elbow: 77, wrist: 83 }, grip: false },

                    { t: 13500, s: { shoulder: -80, elbow: -90, wrist: 10 }, grip: false },
                ];
                
                const totalDuration = 14500;
                const lerp = (a, b, t) => {
                    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    return a + (b - a) * ease;
                };

                const loop = () => {
                    const elapsed = (Date.now() - startTime) % totalDuration;
                    
                    let kf1 = sequence[0], kf2 = sequence[0];
                    for(let i=0; i < sequence.length - 1; i++) {
                        if (elapsed >= sequence[i].t && elapsed < sequence[i+1].t) {
                            kf1 = sequence[i]; kf2 = sequence[i+1]; break;
                        }
                    }
                    if (elapsed >= sequence[sequence.length-1].t) {
                        kf1 = sequence[sequence.length-1]; kf2 = sequence[sequence.length-1];
                    }
                    
                    const dt = kf2.t - kf1.t;
                    const progress = dt === 0 ? 1 : Math.max(0, Math.min(1, (elapsed - kf1.t) / dt));
                    
                    setIkState({
                        base: 0,
                        shoulder: lerp(kf1.s.shoulder, kf2.s.shoulder, progress),
                        elbow: lerp(kf1.s.elbow, kf2.s.elbow, progress),
                        wrist: lerp(kf1.s.wrist, kf2.s.wrist, progress)
                    });
                    
                    setGripClosed(kf2.grip);
                    
                    setTrashState([
                        { id: 1, x: -39, type: 'bottle', y: 334, state: elapsed < 1200 ? 'ground' : elapsed < 3500 ? 'grabbed' : 'bin' },
                        { id: 2, x: -160, type: 'electronics', y: 325, state: elapsed < 5800 ? 'ground' : elapsed < 8000 ? 'grabbed' : 'bin' },

                    ]);

            const eEndY = sEndY - L2 * Math.cos(s_rad + e_rad);

 * when hardware selections change in selectedHardware / simulationData.hardware.

 *  - Actuators (Servos/Steppers): SG90 → тонкие линии; MG995 / NEMA 17 → массивные
 *    звенья с двойным контуром и «металлическим» градиентом.
 *  - Links (Каркас): толщина и стиль зависят от материала (Пластик — тонкие сплошные
 *    линии, Алюминий — широкие полые линии с технической штриховкой).
 *  - End-effector (Захват): полностью меняет форму (клешня / присоска / магнит).
 *
 * Reactivity: useEffect следит за hardware; при любом изменении атрибуты
 * stroke-width, d (path), transform обновляются мгновенно.
 *
 * Team Sync: объект визуальных параметров транслируется через localStorage /
 * merge.js всем участникам команды (инженер меняет мотор → программист видит

/* Определяем материал каркаса: явный frameMaterial из hardware или fallback на контроллер */
const deriveMaterial = (controllerId, hardware) => {
    if (hardware?.frameMaterial) return hardware.frameMaterial;
    if (!controllerId) return 'aluminum';
    const cheapControllers = ['arduino_uno_r3', 'esp32_devkit'];
    return cheapControllers.includes(controllerId) ? 'plastic' : 'aluminum';
};

/** Металлический градиент для массивных приводов */
const MetallicGradient = ({ id, color, accent }) => (
    <radialGradient id={id} cx="35%" cy="35%" r="65%">
        <stop offset="0%" stopColor={accent} stopOpacity="0.5" />
        <stop offset="60%" stopColor={color} stopOpacity="0.8" />
        <stop offset="100%" stopColor={color} stopOpacity="1" />
    </radialGradient>
);

/** Техническая штриховка (алюминий / NEMA) */
const HatchingPattern = ({ id }) => (
    <pattern id={id} patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,255,255,0.15)" strokeWidth="1" />
    </pattern>
);

/** Звено манипулятора (трапециевидный профиль как у промышленных роботов) */
const RobotLink = ({ x1, y1, x2, y2, actuatorConfig, materialConfig, linkIndex }) => {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    const perpX = -dy / len;
    const perpY = dx / len;
    /* Трапеция: шире у основания (joint), уже у конца */
    const wideW = (actuatorConfig.linkWidth || 12) * 0.6;
    const narrowW = (actuatorConfig.linkWidth || 12) * 0.35;

    const gradId = `linkGrad-${linkIndex}`;
    const useGrad = actuatorConfig.metallic;

    return (
        <g className={`robot-link-group link-${linkIndex}`}>
            <defs>
                {useGrad ? <MetallicGradient id={gradId} color={actuatorConfig.color} accent={actuatorConfig.accent} /> : null}
            </defs>
            {/* Трапециевидное звено — шире у мотора */}
            <polygon
                points={`${x1 + perpX * wideW},${y1 + perpY * wideW} ${x2 + perpX * narrowW},${y2 + perpY * narrowW} ${x2 - perpX * narrowW},${y2 - perpY * narrowW} ${x1 - perpX * wideW},${y1 - perpY * wideW}`}
                fill={useGrad ? `url(#${gradId})` : 'rgba(10,15,25,0.5)'}
                stroke={actuatorConfig.linkStroke || materialConfig.linkStroke}
                strokeWidth={1}
                opacity={materialConfig.opacity}
                className="robot-link-body"
            />
            {/* Ребро жёсткости по центру */}
            <line x1={x1} y1={y1} x2={x2} y2={y2}
                stroke={actuatorConfig.accent || '#fff'} strokeWidth={0.5} opacity={0.15}
            />
        </g>
    );
};

                {config.showGradient ? <MetallicGradient id={gradId} color={config.color} accent={config.accent} /> : null}

            {/* Outer glow для premium */}

            {type === 'micro' && (
                <g>
                    {/* Характерный закругленный корпус MG90S/SG90 */}

                             L ${cx-R} ${cy-R*0.8}

                             L ${cx+R} ${cy+R*0.8}

/** Захват — промышленная параллельная клешня (Высокое качество) */

/* ──────────────────────────────────────────────
   3. MAIN COMPONENT
   ────────────────────────────────────────────── */

const ManipulatorVisualizer = ({ hardware, ikState, gripClosed, totals, scale = 1, baseYOffset = 0, showStats = true, isTesting = false, testPhase = 0, sceneBackground, sceneForeground }) => {
    const SVG_W = 500;
    const SVG_H = 500;
    const BASE_X = 100;
    const BASE_Y = 190;
    const BASE_H = 60;

    /* Длины звеньев (px) */
    const L1 = 165;
    const L2 = 135;
    const L3 = 90;

    /* ── Pan & Zoom ── */
    var containerRef = useRef(null);
    var svgGroupRef = useRef(null);
    var isFrozen = !showStats && sceneBackground;
    var panZoomRef = useRef(isFrozen ? { x: 170, y: 50, zoom: 0.3 } : { x: 0, y: 0, zoom: 1.2 });
    var isDraggingRef = useRef(false);
    var lastMouseRef = useRef({ x: 0, y: 0 });
    var zoomDisplayState = useState(120);
    var zoomDisplay = zoomDisplayState[0];
    var setZoomDisplay = zoomDisplayState[1];

    function applyTransform() {
        var g = svgGroupRef.current;
        if (!g) return;
        var pz = panZoomRef.current;
        var s = pz.zoom * scale;
        var yOff = parseFloat(baseYOffset) || 0;
        g.setAttribute('transform',
            'translate(' + pz.x + ' ' + (pz.y + yOff) + ') scale(' + s + ')');
    }

    function zoomAt(delta, cx, cy) {
        var pz = panZoomRef.current;
        var el = containerRef.current;
        if (!el) return;
        var rect = el.getBoundingClientRect();
        var mx = cx - rect.left;
        var my = cy - rect.top;
        var oldZoom = pz.zoom;
        var newZoom = Math.min(3, Math.max(0.3, oldZoom + delta));
        var ratio = newZoom / oldZoom;
        pz.x = mx - ratio * (mx - pz.x);
        pz.y = my - ratio * (my - pz.y);
        pz.zoom = newZoom;
        setZoomDisplay(Math.round(newZoom * 100));
        applyTransform();
    }

    function resetView() {
        panZoomRef.current = { x: 0, y: 0, zoom: 1.2 };
        setZoomDisplay(120);
        applyTransform();
    }

    // Кнопки refs
    var btnZoomIn = useRef(null);
    var btnZoomOut = useRef(null);
    var btnReset = useRef(null);

    useEffect(function() {
        setTimeout(function() {
            var el = containerRef.current;
            if (!el) return;

            if (isFrozen) {
                applyTransform();
                return;
            }

            function onWheel(e) {
                e.preventDefault();
                var d = e.deltaY > 0 ? -0.1 : 0.1;
                zoomAt(d, e.clientX, e.clientY);
            }

            function onMouseDown(e) {
                if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
                    isDraggingRef.current = true;
                    lastMouseRef.current = { x: e.clientX, y: e.clientY };
                    el.style.cursor = 'grabbing';
                    e.preventDefault();
                }
            }

            function onMouseMove(e) {
                if (!isDraggingRef.current) return;
                var dx = e.clientX - lastMouseRef.current.x;
                var dy = e.clientY - lastMouseRef.current.y;
                panZoomRef.current.x += dx;
                panZoomRef.current.y += dy;
                lastMouseRef.current = { x: e.clientX, y: e.clientY };
                applyTransform();
            }

            function onMouseUp() {
                if (isDraggingRef.current) {
                    isDraggingRef.current = false;
                    el.style.cursor = 'grab';
                }
            }

            function onMouseLeave() {
                isDraggingRef.current = false;
                el.style.cursor = 'grab';
            }

            el.addEventListener('wheel', onWheel, { passive: false });
            el.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            el.addEventListener('mouseleave', onMouseLeave);

            // Кнопки
            var bIn = btnZoomIn.current;
            var bOut = btnZoomOut.current;
            var bRst = btnReset.current;
            if (bIn) bIn.onclick = function(e) { e.stopPropagation(); var r = el.getBoundingClientRect(); zoomAt(0.2, r.left + r.width/2, r.top + r.height/2); };
            if (bOut) bOut.onclick = function(e) { e.stopPropagation(); var r = el.getBoundingClientRect(); zoomAt(-0.2, r.left + r.width/2, r.top + r.height/2); };
            if (bRst) bRst.onclick = function(e) { e.stopPropagation(); resetView(); };

            // Установка начального вида
            applyTransform();

            return function() {
                el.removeEventListener('wheel', onWheel);
                el.removeEventListener('mousedown', onMouseDown);
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
                el.removeEventListener('mouseleave', onMouseLeave);
            };
        }, 100);
    }, [isFrozen]);

    /* ── Разрешение визуальных параметров из hardware — используем useMemo для мгновенного рендера ── */
    const shoulderCfg = HARDWARE_VISUAL_MAP.actuators[hardware?.shoulderActuator]
        || HARDWARE_VISUAL_MAP.actuators.mg995;
    const elbowCfg = HARDWARE_VISUAL_MAP.actuators[hardware?.elbowActuator]
        || HARDWARE_VISUAL_MAP.actuators.mg995;
    const wristCfg = HARDWARE_VISUAL_MAP.actuators[hardware?.wristActuator]
        || HARDWARE_VISUAL_MAP.actuators.mg996r;
    const gripperCfg = HARDWARE_VISUAL_MAP.grippers[hardware?.gripper]
        || HARDWARE_VISUAL_MAP.grippers.parallel_gripper_2f;
    const matKey = deriveMaterial(hardware?.controller, hardware);
    const materialCfg = HARDWARE_VISUAL_MAP.materials[matKey]
        || HARDWARE_VISUAL_MAP.materials.aluminum;

    const visualParams = {
        shoulder: shoulderCfg,
        elbow: elbowCfg,
        wrist: wristCfg,
        gripper: gripperCfg,
        material: materialCfg,
        materialKey: matKey
    };

    /* ── Team Sync: трансляция визуальных параметров ── */
    useEffect(() => {
        try {
            const syncPayload = {
                type: 'VISUAL_PARAMS_UPDATE',
                timestamp: Date.now(),
                params: {
                    shoulder: shoulderCfg.label,
                    elbow: elbowCfg.label,
                    wrist: wristCfg.label,
                    gripper: gripperCfg.type,
                    material: matKey
                }
            };
            const prev = JSON.parse(localStorage.getItem('tehnoland_visual_sync') || '{}');
            prev.feed = prev.feed || [];
            prev.feed.unshift(syncPayload);
            prev.feed = prev.feed.slice(0, 20);
            prev.latest = syncPayload;
            localStorage.setItem('tehnoland_visual_sync', JSON.stringify(prev));
        } catch (_) { /* ignore */ }
    }, [hardware?.shoulderActuator, hardware?.elbowActuator, hardware?.wristActuator, hardware?.gripper, hardware?.controller]);

    /* ── Углы из IK ── */
    const baseRad = ikState?.base || 0;
    const shoulderRad = ikState?.shoulder || 0;
    const elbowRad = ikState?.elbow || 0;

    /* ── Плавная анимация углов при тестировании ── */
    const shoulderAnimRef = useRef(shoulderRad);
    const elbowAnimRef = useRef(elbowRad);
    const homeRef = useRef({ s: shoulderRad, e: elbowRad });
    const [animTick, setAnimTick] = useState(0);

    // Сохраняем домашнюю позицию при каждом рендере
    homeRef.current = { s: shoulderRad, e: elbowRad };

    // Запускаем анимацию только при смене фазы теста
    useEffect(() => {
        const { s: homeS, e: homeE } = homeRef.current;
        const targetS = (isTesting && testPhase === 2) ? homeS - 0.3 : homeS;
        const targetE = (isTesting && testPhase === 2) ? homeE + 0.4 : homeE;

        let running = true;
        let frame;
        const tick = () => {
            if (!running) return;
            const sDiff = targetS - shoulderAnimRef.current;
            const eDiff = targetE - elbowAnimRef.current;
            if (Math.abs(sDiff) > 0.001 || Math.abs(eDiff) > 0.001) {
                shoulderAnimRef.current += sDiff * 0.12;
                elbowAnimRef.current += eDiff * 0.12;
                setAnimTick(t => t + 1);
                frame = requestAnimationFrame(tick);
            } else {
                shoulderAnimRef.current = targetS;
                elbowAnimRef.current = targetE;
                setAnimTick(t => t + 1);
            }
        };
        frame = requestAnimationFrame(tick);
        return () => { running = false; cancelAnimationFrame(frame); };
    }, [isTesting, testPhase]);

    const activeShoulderRad = isTesting ? shoulderAnimRef.current : shoulderRad;
    const activeElbowRad = isTesting ? elbowAnimRef.current : elbowRad;
    const activeWristRad = ikState?.wrist || 0;

    /* ── Индикатор пикового тока при старте ── */
    const showPeakIndicator = isTesting && testPhase === 1;

    /* Преобразуем в градусы для отладки */
    const shoulderDeg = -(activeShoulderRad * 180 / Math.PI);
    const elbowDeg = -(activeElbowRad * 180 / Math.PI);

    /* ── Forward Kinematics (2D проекция) ── */
    const baseJX = BASE_X;
    const baseJY = BASE_Y - BASE_H;

    /* Сустав shoulder → elbow */
    const sEndX = baseJX + L1 * Math.sin(activeShoulderRad);
    const sEndY = baseJY - L1 * Math.cos(activeShoulderRad);

    /* Сустав elbow → wrist */
    const eEndX = sEndX + L2 * Math.sin(activeShoulderRad + activeElbowRad);
    const eEndY = sEndY - L2 * Math.cos(activeShoulderRad + activeElbowRad);

    /* Конечная точка (wrist → end-effector) */
    const wEndX = eEndX + L3 * Math.sin(activeShoulderRad + activeElbowRad + activeWristRad);
    const wEndY = eEndY - L3 * Math.cos(activeShoulderRad + activeElbowRad + activeWristRad);

    /* Риск механической поломки */
    const mechRisk = totals?.mechanicalRisk || false;

    const { shoulder, elbow, wrist, gripper, material } = visualParams;

    return (
        <div ref={containerRef} className="manipulator-visualizer-wrap" style={{
            width: '100%',
            height: '100%',
            position: 'relative',
            overflow: 'hidden',
            cursor: isFrozen ? 'default' : 'grab',
            userSelect: 'none'
        }}>

            {/* Индикатор механического риска (Industrial Alert) */}

                    position: 'absolute', top: 10, right: 10, zIndex: 10,

                    borderRadius: 4, fontSize: '10px', color: '#fff',
                    textTransform: 'uppercase', fontWeight: '900', letterSpacing: '1.5px',
                    boxShadow: '0 0 20px rgba(248, 81, 73, 0.4)',
                    animation: 'jointPulse 0.8s ease-in-out infinite',
                    fontFamily: "'Inter', sans-serif"
                }}>
                    STRESS ALERT
                </div>
            )}

            <svg viewBox={`0 0 ${SVG_W} ${SVG_H}`}
                style={{
                    width: '100%', height: '100%',
                    overflow: 'visible',
                    filter: mechRisk ? 'drop-shadow(0 0 10px rgba(255,60,60,0.35))' : 'none',
                    pointerEvents: 'none'
                }}>

                {/* Группа панорамирования и зума — управляется через ref */}
                <g ref={svgGroupRef}
                   transform={'translate(0 ' + (parseFloat(baseYOffset) || 0) + ') scale(' + scale + ')'}>
                    {/* ─── SCENE BACKGROUND ─── */}
                    {sceneBackground}

                    {/* Линия земли */}
                    <line x1={-SVG_W} y1={BASE_Y} x2={SVG_W * 2} y2={BASE_Y}
                        stroke="rgba(125,232,255,0.15)" strokeWidth="1"
                        strokeDasharray="6,4" />

                    {/* ─── BASE ─── */}
                    <g className="robot-base" style={{ transition: 'all 0.3s ease' }}>
                        {/* Основание-фланец */}
                        <polygon
                            points={`${BASE_X - 32},${BASE_Y} ${BASE_X - 24},${baseJY - 5} ${BASE_X + 24},${baseJY - 5} ${BASE_X + 32},${BASE_Y}`}
                            fill="rgba(10,15,25,0.6)"
                            stroke="rgba(125,232,255,0.3)"
                            strokeWidth="1"
                        />
                        {/* Крепёжные болты */}
                        <circle cx={BASE_X - 22} cy={BASE_Y - 4} r={2} fill="rgba(125,232,255,0.4)" />
                        <circle cx={BASE_X + 22} cy={BASE_Y - 4} r={2} fill="rgba(125,232,255,0.4)" />
                        {/* Пьедестал */}
                        <rect x={BASE_X - 6} y={baseJY - 5} width={12} height={5}
                            fill="rgba(10,15,25,0.4)" stroke="rgba(125,232,255,0.2)" strokeWidth={0.5} />
                        {/* Монтажная плита */}
                        <rect x={BASE_X - 18} y={BASE_Y - 3} width={36} height={3} rx={1}
                            fill="rgba(125,232,255,0.08)" stroke="rgba(125,232,255,0.2)" strokeWidth={0.5} />
                        {/* ─── КОНТРОЛЛЕР И КОММУНИКАЦИИ ─── */}
                        {(() => {
                            const ctrlId = hardware?.controller || 'esp32_devkit';
                            const c = HARDWARE_VISUAL_MAP.controllers[ctrlId] || HARDWARE_VISUAL_MAP.controllers.esp32_devkit;
                            const bW = 42;
                            const bH = 30;
                            const bX = BASE_X - bW / 2;
                            const bY = BASE_Y - bH - 4;

                            // Общие узлы для трассировки кабелей
                            const root = { x: bX + bW/2, y: bY + bH/2 };
                            const j0 = { x: baseJX, y: baseJY };
                            const j1 = { x: sEndX, y: sEndY };
                            const j2 = { x: eEndX, y: eEndY };
                            const j3 = { x: wEndX, y: wEndY };

                            // Смещения для каждого провода в пучке (чтобы не сливались)
                            const off = (val) => ({ x: 0, y: val }); // Упрощенное смещение по Y

                             // Точки для сенсоров (синхронизированные с hardware)
                             const visId = hardware?.visionSensor || 'ov2640_cam';
                             const forceId = hardware?.forceSensor || 'hx711_loadcell';

                             // Датчик усилия встроен прямо между запястьем и захватом (S-образный тензодатчик)
                             const forcePos = { x: wEndX, y: wEndY - 8 }; 

                            return (

                                    <WirePath points={[root, j0, j1]} color={elbow.color} isTesting={isTesting} />

                                    {forceId !== 'none' && <WirePath points={[root, j0, j1, j2, forcePos]} color="#ff9933" isTesting={isTesting} />}
                                    
                                    <ControllerBoard id={ctrlId} x={bX} y={bY} width={bW} height={bH} config={c} />

                                </g>
                            );
                        })()}
                    </g>

                </g>

                {/* ─── LINK 2 (elbow → wrist) ─── */}

                    <RobotLink

                        x2={wEndX} y2={wEndY}

                </g>

                {/* ─── JOINTS ─── */}
                <RobotJoint
                    key="joint-shoulder"
                    cx={baseJX} cy={baseJY}

                    jointIndex={0}
                />

                <RobotJoint
                    key="joint-elbow"
                    cx={sEndX} cy={sEndY}
                    config={elbow}
                    jointIndex={1}
                />

                <RobotJoint
                    key="joint-wrist"
                    cx={eEndX} cy={eEndY}
                    config={wrist}
                    jointIndex={2}
                />

                {/* ─── END-EFFECTOR ─── */}
                <g className="end-effector-group">
                    {renderEndEffector(
                        gripper.type,
                        wEndX, wEndY,
                        isTesting ? (animTick % 2 !== 0) : !gripClosed,
                        gripper
                    )}
                </g>

                {/* ─── SENSORS ─── */}
                <g className="sensors-layer">
                    {(() => {
                        const visId = hardware?.visionSensor || 'ov2640_cam';
                        const forceId = hardware?.forceSensor || 'hx711_loadcell';

                        const sPos = { x: sEndX, y: sEndY - 26 };
                        const forcePos = { x: wEndX, y: wEndY - 8 };
                        
                        return (
                            <>
                                {visId !== 'none' && <HardwareSensor id={visId} type="vision" x={sPos.x} y={sPos.y} isTesting={isTesting} />}
                                {forceId !== 'none' && <HardwareSensor id={forceId} type="force" x={forcePos.x} y={forcePos.y} isTesting={isTesting} />}
                            </>
                        );
                    })()}
                </g>


                {/* ─── RELIABILITY BADGE ─── */}

                    <g className="reliability-badge">
                        <rect x={8} y={SVG_H - 32} width="85" height="24" rx="3"

                    {/* ─── SCENE FOREGROUND ─── */}

            </svg>


        </div>
    );
};

// Аналитическая функция для извлечения лидеров в каждой категории (для умных тегов)
const getCategoryHighlights = (category) => {
    const items = HARDWARE_LIBRARY[category] || [];
    if (items.length === 0) return {};
    return {
        minPrice: Math.min(...items.map(i => i.price)),
        maxReliability: Math.max(...items.map(i => i.reliability || 0)),
        maxPower: Math.max(...items.map(i => (i.torque || i.payload_capacity || i.compute || 0))),
        minWeight: Math.min(...items.map(i => i.weight || 100)),
        maxCompute: Math.max(...items.map(i => i.compute || 0))
    };
};

const HARDWARE_DEFAULTS = {
    controller: 'esp32_devkit',
    shoulderActuator: 'mg995',
    elbowActuator: 'mg995',
    wristActuator: 'mg996r',
    gripper: 'parallel_gripper_2f',
    visionSensor: 'ov2640_cam',
    forceSensor: 'hx711_loadcell'
};

const BRICS_FEED_LIMIT = 10;
const getLibraryItem = (bucket, id) => HARDWARE_LIBRARY[bucket].find((item) => item.id === id);
const formatUsd = (value) => `$${Number(value || 0).toFixed(2)}`;
const formatKg = (value) => `${Number(value || 0).toFixed(3)} кг`;
const formatPercent = (value) => `${Math.round(Number(value || 0))}%`;

const appendCollaborationFeed = (collaboration, event) => {
    const nextEntry = {
        id: `${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
        at: new Date().toISOString(),
        ...event
    };
    return {
        ...collaboration,
        feed: [nextEntry, ...(collaboration?.feed || [])].slice(0, BRICS_FEED_LIMIT)
    };
};

const getRequiredPorts = (hardware) => {
    const visionSensor = getLibraryItem('sensors', hardware.visionSensor);
    const forceSensor = getLibraryItem('sensors', hardware.forceSensor);

    return {
        pwm: 4,
        analog: forceSensor?.ports?.analog || 0,
        digital: forceSensor?.ports?.digital || 0,
        uart: visionSensor?.ports?.uart || 0,
        i2c: visionSensor?.ports?.i2c || 0
    };
};

const hasEnoughPorts = (controller, requiredPorts) => (
    Object.keys(requiredPorts).every((key) => Number(controller?.ports?.[key] || 0) >= Number(requiredPorts[key] || 0))
);

const deriveSimulationFromHardware = (hardware, scenario, existingBusiness = {}, existingCollaboration = {}, existingSoftware = {}, marketState = {}, purchasedSamples = []) => {
    const activeEvent = existingCollaboration?.activeBricsEvent;
    const bricsEvents = existingCollaboration?.bricsEvents || [];

    const selected = {
        controller: getLibraryItem('controllers', hardware.controller) || HARDWARE_LIBRARY.controllers[0],
        shoulder: getLibraryItem('actuators', hardware.shoulderActuator) || HARDWARE_LIBRARY.actuators[0],
        elbow: getLibraryItem('actuators', hardware.elbowActuator) || HARDWARE_LIBRARY.actuators[0],
        wrist: getLibraryItem('actuators', hardware.wristActuator) || HARDWARE_LIBRARY.actuators[0],
        gripper: getLibraryItem('grippers', hardware.gripper) || HARDWARE_LIBRARY.grippers[0],
        vision: getLibraryItem('sensors', hardware.visionSensor) || HARDWARE_LIBRARY.sensors[0],
        force: getLibraryItem('sensors', hardware.forceSensor) || HARDWARE_LIBRARY.sensors[0]
    };

    const parts = [
        { slot: 'Контроллер', bucket: 'controllers', spec: selected.controller },
        { slot: 'Плечевая ось', bucket: 'actuators', spec: selected.shoulder },
        { slot: 'Локтевая ось', bucket: 'actuators', spec: selected.elbow },
        { slot: 'Ось запястья', bucket: 'actuators', spec: selected.wrist },
        { slot: 'Захват', bucket: 'grippers', spec: selected.gripper },
        { slot: 'Камера', bucket: 'sensors', spec: selected.vision },
        { slot: 'Датчик усилия', bucket: 'sensors', spec: selected.force }
    ].map((item, index) => ({
        id: `${item.bucket}-${item.spec.id}-${index}`,
        slot: item.slot,
        bucket: item.bucket,
        ...item.spec
    }));

    const bomCost = parts.reduce((sum, part) => {
        const isSample = (purchasedSamples || []).includes(part.spec?.id || part.id); // We spread spec, so part.id should be item.spec.id before line 380. 
        // Wait, line 380 overwrites it. I'll fix the map first.
        return sum + Number(part.price || 0);
    }, 0);
    const powerWatts = parts.reduce((sum, part) => sum + Number(part.power || 0), 0);

    // Реалистичная проверка питания: только ОДИН серво в пике, остальные в рабочем режиме
    const actuatorParts = parts.filter(p => p.bucket === 'actuators' || p.bucket === 'grippers');
    const maxPeakSingle = actuatorParts.reduce((max, p) => Math.max(max, p.peak_current || 0), 0);
    const otherRunning = actuatorParts.reduce((sum, p) => {
        const isMax = (p.peak_current || 0) === maxPeakSingle && maxPeakSingle > 0;
        return sum + (isMax ? 0 : Number(p.current_draw || 0));
    }, 0);
    const runningCurrent = actuatorParts.reduce((sum, p) => sum + Number(p.current_draw || 0), 0);
    const sensorRunning = parts.filter(p => p.bucket === 'sensors' || p.bucket === 'controllers').reduce((sum, p) => sum + Number(p.current_draw || 0), 0);
    const peakCurrent = maxPeakSingle + otherRunning + sensorRunning;
    const currentLimit = Number(selected.controller?.max_current || 0);
    const powerSupplyOverload = peakCurrent > currentLimit && currentLimit > 0;

    const structuralWeight = Number((0.82 + 0.15 + parts.reduce((sum, part) => sum + Number(part.weight || 0), 0)).toFixed(3));
    const frameCost = 8;

    // Применяем влияние динамического рынка (теперь берем из входного аргумента для надежности)
    const market = marketState || { 
        indices: { tech: 1, energy: 1, logistics: 1 }, 
        creditScore: 70,
        upgrades: [] 
    };
    
    // Базовый расчет с учетом рыночных индексов
    let totalBomCost = (bomCost * (market.indices?.tech || 1)) + (frameCost * (market.indices?.logistics || 1));
    
    // Влияние активного события (Новостей)
    if (market.activeAlert && market.activeAlert.impact) {
        const { type, multiplier } = market.activeAlert.impact;
        let mult = multiplier;
        
        // [UPGRADE] Logistics Optimization
        if (type === 'logistics' && market.upgrades?.includes('LOG_OPT')) {
            mult = 1 + (mult - 1) * 0.6; // Снижаем штраф на 40%
        }
        
        if (type === 'tech' || type === 'logistics' || type === 'energy') {
            totalBomCost *= mult;
        }
    }

    // [UPGRADE] Bulk Purchasing (Оптовые закупки)
    if (market.upgrades?.includes('BULK_BUY')) {
        totalBomCost *= 0.92; // Постоянная скидка 8%
    }

    // Влияние кредитного рейтинга (Репутация)
    const score = market.creditScore || 70;
    if (score > 90) {
        totalBomCost *= 0.9; // Скидка 10% за надежность
    } else if (score < 40) {
        totalBomCost *= 1.15; // Наценка 15% за риски
    }

    let bricsEventModifier = null;
    if (activeEvent?.effect) {
        const eff = activeEvent.effect;
        if (eff.bomMultiplier) {
            totalBomCost = Number((totalBomCost * eff.bomMultiplier).toFixed(2));
            bricsEventModifier = { type: 'bomMultiplier', value: eff.bomMultiplier, title: activeEvent.title };
        }
        // ... (остальная логика BRICS остается прежней)
        if (eff.bomDiscount) {
            totalBomCost = Number((totalBomCost * (1 - eff.bomDiscount)).toFixed(2));
            bricsEventModifier = { type: 'bomDiscount', value: eff.bomDiscount, title: activeEvent.title };
        }
        if (eff.priceMultiplier) {
            if (eff.slot === 'controller' && eff.targetId === hardware.controller) {
                const part = parts.find(p => p.id && p.bucket === 'controllers');
                if (part) {
                    totalBomCost = Number((totalBomCost + part.price * (eff.priceMultiplier - 1)).toFixed(2));
                    bricsEventModifier = { type: 'priceSurge', value: eff.priceMultiplier, title: activeEvent.title };
                }
            }
        }
        if (eff.priceDiscount && eff.slot === 'sensor') {
            const part = parts.find(p => p.bucket === 'sensors' && p.id?.includes(eff.targetId));
            if (part) {
                totalBomCost = Number((totalBomCost - part.price * eff.priceDiscount).toFixed(2));
                bricsEventModifier = { type: 'priceDrop', value: eff.priceDiscount, title: activeEvent.title };
            }
        }
    }
    totalBomCost = Number(totalBomCost.toFixed(2));
    const payloadCapacity = Math.min(selected.shoulder.payload_capacity, selected.elbow.payload_capacity, selected.wrist.payload_capacity, selected.gripper.payload_capacity);
    // Нагрузка = только блок (захват — часть руки, не груз)
    const totalLoad = Number((scenario.blockWeight || 0).toFixed(3));
    const weakestTorque = Math.min(selected.shoulder.torque, selected.elbow.torque, selected.wrist.torque);
    const torqueDemand = Number((totalLoad * 9.81 * 0.12).toFixed(2));
    const torqueMargin = Number((weakestTorque - torqueDemand).toFixed(2));

    const armLengths = { shoulder: 0.15, elbow: 0.12, wrist: 0.08 };
    const comOffset = (
        (selected.shoulder.com_offset || 0) * armLengths.shoulder +
        (selected.elbow.com_offset || 0) * armLengths.elbow +
        (selected.wrist.com_offset || 0) * armLengths.wrist +
        (selected.gripper.com_offset || 0) * (armLengths.wrist + 0.05)
    ) / (armLengths.shoulder + armLengths.elbow + armLengths.wrist + 0.05);
    const centerOfMassOffset = Number(comOffset.toFixed(3));
    // Механика баланса: ЦМ опасен только при тяжёлом захвате И слабом плече
    // MG995 (9.4) и MG996R (11.0) проходят, SG90 (1.8) — нет
    const comRisk = centerOfMassOffset > 0.14 && selected.shoulder.torque < 9;

    const meanActuatorSpeed = (selected.shoulder.speed + selected.elbow.speed + selected.wrist.speed) / 3;
    const sensorNoise = Number((((selected.vision.noise || 0) + (selected.force.noise || 0)) / 2).toFixed(3));
    const requiredPorts = getRequiredPorts(hardware);
    const controllerPortsOk = hasEnoughPorts(selected.controller, requiredPorts);
    const controllerCompute = Number(selected.controller.compute || 1);
    const softwareBonus = Number(existingSoftware?.reliabilityBonus || 1);
    const noisePenalty = Math.max(0.72, 1 - sensorNoise * 0.9);
    const loadPenalty = Math.max(0.42, 1 - Math.max(0, totalLoad / Math.max(payloadCapacity, 0.01)) * 0.35);
    const armSpeedFactor = Number((controllerCompute * meanActuatorSpeed * loadPenalty * noisePenalty * softwareBonus).toFixed(2));
    const estimatedCycleSeconds = Number((8.4 / Math.max(armSpeedFactor, 0.32)).toFixed(2));

    const mechanicalRisk = totalLoad > payloadCapacity || torqueMargin < 0 || structuralWeight > 2.4 || powerSupplyOverload;

    const componentReliabilities = [
        selected.controller.reliability || 1.0,
        selected.shoulder.reliability || 1.0,
        selected.elbow.reliability || 1.0,
        selected.wrist.reliability || 1.0,
        selected.gripper.reliability || 1.0
    ];

    const actuatorReliability = Math.min(...componentReliabilities);
    let reliabilityScore = Math.max(42, Math.min(97, Math.round(actuatorReliability * 100)));

    const activeGrants = existingBusiness?.activeGrants || []; // From economist
    if (activeGrants.includes('heavy_duty') && structuralWeight > 5.0) {
        reliabilityScore = Math.round(reliabilityScore * 0.9);
    }

    const warnings = [];
    const alerts = [];
    const maskotAlerts = [];

    if (mechanicalRisk) {
        warnings.push('Риск механического отказа: нагрузка, запас по моменту или масса рамы выходят за безопасный диапазон выбранных приводов.');
    }
    if (powerSupplyOverload) {
        warnings.push(`⚡ ПЕРЕГРУЗКА ПИТАНИЯ: пиковый ток ${peakCurrent.toFixed(2)}А превышает лимит контроллера ${currentLimit.toFixed(2)}А!`);
        alerts.push({ type: 'error', message: 'Power Supply Overload', source: 'proto' });
        maskotAlerts.push({ character: 'proto', emotion: 'sad', message: `Критическая перегрузка питания! Пиковый ток ${peakCurrent.toFixed(2)}А > лимит ${currentLimit.toFixed(2)}А. Выбери контроллер с большим током или менее мощные моторы.` });
    }
    if (!controllerPortsOk) {
        warnings.push('Предупреждение программиста: выбранному контроллеру не хватает свободных портов для текущего набора датчиков и 3-осевой руки.');
    }
    if (sensorNoise > 0.08) {
        warnings.push('Шум датчиков повышен. Перед захватом нужно использовать блок ожидания датчика с фильтрацией.');
        maskotAlerts.push({ character: 'code', emotion: 'norm', message: 'Шумные датчики! Добавь блок фильтра (скользящее среднее) в программу, иначе манипулятор будет дрожать.' });
    }
    if (powerWatts > 34) {
        warnings.push('Энергопотребление повышено. Нужен отдельный силовой контур и проверка теплового режима.');
    }
    if (torqueMargin < 0) {
        maskotAlerts.push({ character: 'proto', emotion: 'sad', message: `Критическая нагрузка на сервопривод! Запас момента ${torqueMargin.toFixed(2)} кг·см < 0. Увеличь момент привода или снизь нагрузку.` });
    }

    if (activeGrants.includes('heavy_duty') && structuralWeight > 5.0) {
        warnings.push('⚖ ГРАНТ HEAVY DUTY: Вес манипулятора превысил 5кг! Наложен штраф -10% к Идеалу проекта.');
        maskotAlerts.push({ character: 'proto', emotion: 'norm', message: 'Мы превысили 5кг по условию гранта Heavy Duty. Это снизит финальный рейтинг системы.' });
    }

    const collaboration = {
        syncMode: existingCollaboration?.syncMode || 'Синхронизация вкладок + локальное хранилище',
        messages: existingCollaboration?.messages || [],
        feed: existingCollaboration?.feed || [],
        activeNotifications: alerts,
        maskotAlerts: [...(existingCollaboration?.maskotAlerts || []), ...maskotAlerts].slice(-5)
    };

    const baseCyclesPerMonth = Math.round((26 * 8 * 3600) / estimatedCycleSeconds);
    const robotOutputPerMonth = Math.round(baseCyclesPerMonth * softwareBonus);
    const monthlyManualCost = Number((existingBusiness.laborCostMonthly || 420) * (existingBusiness.operatorsCount || 2));
    const robotRevenueEquivalent = Number(((robotOutputPerMonth / Math.max(existingBusiness.manualOutputPerMonth || 6400, 1)) * monthlyManualCost).toFixed(2));
    const monthlySavings = Number(Math.max(0, robotRevenueEquivalent - (existingBusiness.serviceMonthly || 28)).toFixed(2));
    const robotPrice = Number((bomCost * 2.05).toFixed(2));
    const roiMonths = monthlySavings > 0 ? Number((robotPrice / monthlySavings).toFixed(1)) : null;
    const monthlyProfit = Number(monthlySavings.toFixed(2));

    // Grant cap adjustment from BRICS events
    let grantCap = scenario.grantCap || 420;
    if (activeEvent?.effect?.grantBonus) {
        grantCap += activeEvent.effect.grantBonus;
    }

    return {
        hardware,
        bom: parts,
        totals: {
            bomCost: totalBomCost,
            frameCost,
            bricsEventModifier,
            powerWatts,
            peakCurrent,
            runningCurrent,
            sensorRunning,
            maxPeakSingle,
            currentLimit,
            powerSupplyOverload,
            structuralWeight,
            payloadCapacity,
            totalLoad,
            centerOfMassOffset,
            comRisk,
            weakestTorque,
            torqueDemand,
            torqueMargin,
            armSpeedFactor,
            estimatedCycleSeconds,
            reachRadius: 0.34,
            sensorNoise,
            reliabilityScore,
            requiredPorts,
            controllerPorts: selected.controller.ports,
            controllerPortsOk,
            mechanicalRisk,
            warnings,
            alerts
        },
        business: {
            ...existingBusiness,
            robotPrice,
            serviceMonthly: Number((bomCost * 0.07).toFixed(2)),
            robotOutputPerMonth,
            roiMonths,
            monthlyProfit,
            grantCap
        },
        collaboration
    };
};

const CompactHardwareItem = ({ item, isActive, isGhost, onClick, onMouseEnter, onMouseLeave, bucket, onSetHoveredItem, activeItem, category, simulationData }) => {
    const isSample = simulationData?.purchasedSamples?.includes(item.id);
    const powerW = item.power || 0;
    const relPct = Math.round((item.reliability || 0) * 100);
    const relColor = relPct >= 80 ? 'var(--prof-success)' : relPct >= 70 ? 'var(--prof-warning)' : 'var(--prof-error)';
    const price = item.price || 0;
    
    // Сравнение с текущим активным компонентом
    const deltas = activeItem && !isActive ? {
        price: price - activeItem.price,
        rel: relPct - Math.round((activeItem.reliability || 0) * 100),
        power: powerW - (activeItem.power || 0),
        weight: (item.weight || 0) - (activeItem.weight || 0)
    } : null;

    // Умные теги
    const highlights = useMemo(() => getCategoryHighlights(category), [category]);
    const tags = [];
    if (price === highlights.minPrice) tags.push({ text: 'ЭКОНОМ', color: 'var(--prof-text-dim)' });
    if ((item.reliability || 0) === highlights.maxReliability) tags.push({ text: 'НАДЕЖНЫЙ', color: 'var(--prof-success)' });
    if ((item.torque || item.payload_capacity || item.compute || 0) === highlights.maxPower && highlights.maxPower > 0) tags.push({ text: 'МОЩНЫЙ', color: 'var(--prof-accent)' });
    if ((item.weight || 100) === highlights.minWeight) tags.push({ text: 'ЛЕГКИЙ', color: '#bd93f9' });

    );
};

            <div style={{ fontSize: '13px', color: 'var(--prof-text-main)', lineHeight: '1.6', marginBottom: '20px' }}>{item.notes}</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                {[
                    { label: 'Стоимость', value: '$' + item.price, color: 'var(--prof-text-main)' },
                    { label: 'Вес', value: (item.weight||0).toFixed(3) + ' кг', color: 'var(--prof-text-dim)' },
                    { label: 'Мощность', value: (item.power||0).toFixed(1) + ' W', color: 'var(--prof-text-main)' },
                    { label: 'Надёжность', value: relPct + '%', color: relPct >= 80 ? 'var(--prof-success)' : relPct >= 70 ? 'var(--prof-warning)' : 'var(--prof-error)' },
